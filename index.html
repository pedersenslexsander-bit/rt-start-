<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nedtelling til russetiden 2027</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      background: linear-gradient(135deg, #080808, #2b0000, #080808);
    }

    .background-text {
      position: absolute;
      font-size: clamp(100px, 25vw, 350px);
      font-weight: 900;
      color: rgba(255, 255, 255, 0.025);
      transform: rotate(-10deg);
      user-select: none;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 90%;
      max-width: 1000px;
      padding: 45px 25px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 30px;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
      box-shadow: 0 0 60px rgba(255, 0, 0, 0.22);
    }

    .small-title {
      margin-bottom: 10px;
      color: #ff5050;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 5px;
      text-transform: uppercase;
    }

    h1 {
      margin-bottom: 10px;
      font-size: clamp(35px, 7vw, 75px);
      text-transform: uppercase;
    }

    .date {
      margin-bottom: 40px;
      color: #cccccc;
      font-size: 18px;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
    }

    .time-box {
      padding: 25px 10px;
      border-radius: 20px;
      background: linear-gradient(
        145deg,
        rgba(255, 255, 255, 0.1),
        rgba(255, 255, 255, 0.03)
      );
      box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.03);
    }

    .number {
      display: block;
      font-size: clamp(38px, 7vw, 72px);
      font-weight: 900;
      color: #ffffff;
      text-shadow: 0 0 20px rgba(255, 40, 40, 0.8);
    }

    .label {
      display: block;
      margin-top: 8px;
      color: #ff6060;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #message {
      display: none;
      font-size: clamp(40px, 8vw, 90px);
      font-weight: 900;
      color: #ff3333;
      text-shadow: 0 0 30px rgba(255, 0, 0, 0.9);
      animation: pulse 0.8s infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to { transform: scale(1.06); }
    }

    .glow {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: rgba(255, 0, 0, 0.12);
      filter: blur(90px);
      animation: moveGlow 8s infinite alternate ease-in-out;
    }

    @keyframes moveGlow {
      from { transform: translate(-250px, -150px); }
      to { transform: translate(250px, 150px); }
    }

    @media (max-width: 650px) {
      .container {
        padding: 35px 15px;
      }

      .countdown {
        grid-template-columns: repeat(2, 1fr);
      }

      .time-box {
        padding: 20px 5px;
      }
    }
  </style>
</head>

<body>
  <div class="glow"></div>
  <div class="background-text">2027</div>

  <main class="container">
    <p class="small-title">Nedtelling</p>
    <h1>Russetiden 2027</h1>
    <p class="date">Starter 17. mai 2027 kl. 00:00</p>

    <div id="countdown" class="countdown">
      <div class="time-box">
        <span id="days" class="number">0</span>
        <span class="label">Dager</span>
      </div>

      <div class="time-box">
        <span id="hours" class="number">0</span>
        <span class="label">Timer</span>
      </div>

      <div class="time-box">
        <span id="minutes" class="number">0</span>
        <span class="label">Minutter</span>
      </div>

      <div class="time-box">
        <span id="seconds" class="number">0</span>
        <span class="label">Sekunder</span>
      </div>
    </div>

    <div id="message">RUSSETIDEN ER I GANG! 🎉</div>
  </main>

  <script>
    const targetDate = new Date("2027-05-17T00:00:00+02:00").getTime();

    const daysElement = document.getElementById("days");
    const hoursElement = document.getElementById("hours");
    const minutesElement = document.getElementById("minutes");
    const secondsElement = document.getElementById("seconds");
    const countdownElement = document.getElementById("countdown");
    const messageElement = document.getElementById("message");

    function updateCountdown() {
      const distance = targetDate - Date.now();

      if (distance <= 0) {
        countdownElement.style.display = "none";
        messageElement.style.display = "block";
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      daysElement.textContent = days;
      hoursElement.textContent = String(hours).padStart(2, "0");
      minutesElement.textContent = String(minutes).padStart(2, "0");
      secondsElement.textContent = String(seconds).padStart(2, "0");
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
